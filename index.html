<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Tracker</title>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/vue@3.4.27/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue3-sfc-loader@0.9.5/dist/vue3-sfc-loader.js"></script>
  <script>
    const { loadModule } = window['vue3-sfc-loader'];
    const options = {
      moduleCache: { vue: Vue },
      async getFile(url) {
        const res = await fetch(url);
        if (!res.ok) throw Object.assign(new Error(res.statusText + ' ' + url), { res });
        return { getContentData: (asBinary) => (asBinary ? res.arrayBuffer() : res.text()) };
      },
      addStyle(textContent) {
        const style = Object.assign(document.createElement('style'), { textContent });
        document.head.appendChild(style);
      },
      log(type, ...args) { console[type](...args); },
    };
    Vue.createApp(Vue.defineAsyncComponent(() => loadModule('./tools.vue', options))).mount('#app');
  </script>
</body>
</html>
